name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy if the CI run that just completed for this branch passed.
    if: github.event.workflow_run.conclusion == 'success'
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run always checks out the default branch by default;
          # pin to the exact commit CI validated instead.
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - run: npm run build

      # TODO: replace this placeholder with the real deploy step once the
      # staging hosting target is defined. Common options:
      #   - SSH into a VPS and run `docker compose pull && docker compose up -d`
      #   - CLI deploy for a PaaS (railway up / flyctl deploy / render deploy)
      #   - build+push a Docker image to a registry and trigger a remote pull
      # Whatever secrets it needs (SSH key, API token, etc.) should be added
      # under this repo's "staging" GitHub Environment.
      - name: Deploy (placeholder)
        run: |
          echo "TODO: no deploy target configured yet."
          echo "This job currently only verifies the app builds successfully."
