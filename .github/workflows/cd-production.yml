name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AWS_REGION: sa-east-1
  K3S_NODE_TAG: oficina-backend-k3s-node
  ECR_REPOSITORY: oficina-backend

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy if the CI run that just completed for this branch passed
    # (workflow_dispatch has no workflow_run context, so let it through).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    # Add required reviewers to the "production" Environment in
    # Settings > Environments so this job pauses for manual approval
    # before it runs.
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run always checks out the default branch by default;
          # pin to the exact commit CI validated instead.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # The k3s node's IP/instance ID change every time /infra is
      # destroyed and re-applied, so it's discovered by tag at deploy time
      # instead of being hardcoded or read from local Terraform state
      # (which never leaves the operator's machine).
      - name: Find the k3s node
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${K3S_NODE_TAG}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running k3s instance found (tag Name=${K3S_NODE_TAG}). Run 'terraform apply' in /infra first."
            exit 1
          fi

          PUBLIC_IP=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" --output text)

          echo "Found $INSTANCE_ID at $PUBLIC_IP"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "PUBLIC_IP=$PUBLIC_IP" >> "$GITHUB_ENV"

      - name: Fetch kubeconfig via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cat /etc/rancher/k3s/k3s.yaml"]' \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text \
            | sed "s/127.0.0.1/${PUBLIC_IP}/" > "${RUNNER_TEMP}/kubeconfig.yaml"

          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Build and push image to ECR
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE="${ECR_URL}:${{ github.sha }}"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_URL"
          docker build -t "$IMAGE" -t "${ECR_URL}:latest" .
          docker push "$IMAGE"
          docker push "${ECR_URL}:latest"

          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # Namespace/ConfigMap/Secret are applied once by hand right after
      # `terraform apply` (see k8s/README.md) and aren't touched here —
      # the DB password and API keys they hold don't need to live in CI.
      - name: Run database migration
        run: |
          set -euo pipefail
          sed "s#REPLACE_WITH_ECR_IMAGE_URI:latest#${IMAGE}#" k8s/migration-job.yaml > "${RUNNER_TEMP}/migration-job.yaml"
          kubectl delete -f "${RUNNER_TEMP}/migration-job.yaml" --ignore-not-found
          kubectl apply -f "${RUNNER_TEMP}/migration-job.yaml"
          kubectl wait --for=condition=complete job/oficina-backend-migrate -n oficina --timeout=120s

      - name: Deploy application manifests
        run: |
          set -euo pipefail
          sed "s#REPLACE_WITH_ECR_IMAGE_URI:latest#${IMAGE}#" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/oficina-backend -n oficina --timeout=120s
