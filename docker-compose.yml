services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oficina_db
      POSTGRES_USER: oficina_user
      POSTGRES_PASSWORD: oficina_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina_user -d oficina_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://oficina_user:oficina_pass@postgres:5432/oficina_db
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-this-refresh-secret-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data:
