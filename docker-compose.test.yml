services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oficina_test_db
      POSTGRES_USER: oficina_user
      POSTGRES_PASSWORD: oficina_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina_user -d oficina_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
