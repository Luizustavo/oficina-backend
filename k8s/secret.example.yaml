# Template only — copy to secret.yaml (gitignored) and fill in real values.
# DATABASE_URL comes from: terraform output -raw database_url (in /infra)
# JWT_SECRET / JWT_REFRESH_SECRET: generate with `openssl rand -hex 32`
# RESEND_API_KEY: from https://resend.com dashboard
apiVersion: v1
kind: Secret
metadata:
  name: oficina-backend-secret
  namespace: oficina
type: Opaque
stringData:
  # RDS forces SSL; ?sslmode=no-verify is required (the RDS cert isn't in
  # Node's trust store, and Prisma's runtime driver doesn't negotiate TLS
  # unless the connection string says so — plain "require" fails to verify).
  DATABASE_URL: "postgresql://user:password@rds-endpoint:5432/oficina_db?sslmode=no-verify"
  JWT_SECRET: "replace-with-a-strong-random-secret"
  JWT_REFRESH_SECRET: "replace-with-a-different-strong-random-secret"
  RESEND_API_KEY: "re_your_resend_api_key"
